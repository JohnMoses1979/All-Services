name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH & Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/All_Services_App/servixo/all-services

            # Force stop and remove old containers
            docker stop services-mysql services-backend || true
            docker rm services-mysql services-backend || true

            # Bring down any compose network
            docker-compose down || true

            # Rebuild and start fresh
            docker-compose up -d --build
