name: Deploy All Services to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: all-services-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy on EC2 self-hosted runner
    runs-on: self-hosted

    steps:
      - name: Deploy latest code
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="/home/ubuntu/All-Services"

          echo "Go to project"
          cd "$PROJECT_DIR"

          echo "Pull latest code"
          git config --global --add safe.directory "$PROJECT_DIR" || true
          git fetch origin main
          git reset --hard origin/main

          echo "Write env files"
          cat > services-backend/.env <<'ENVEOF'
          ${{ secrets.BACKEND_ENV }}
          ENVEOF

          cat > services/.env <<'ENVEOF'
          ${{ secrets.FRONTEND_ENV }}
          ENVEOF

          echo "Build backend jar"
          cd "$PROJECT_DIR/services-backend"
          chmod +x mvnw 2>/dev/null || true

          if [ -f mvnw ]; then
            ./mvnw clean package -DskipTests
          else
            mvn clean package -DskipTests
          fi

          cd "$PROJECT_DIR"

          echo "Clean old backend/frontend containers"
          sudo docker compose stop backend frontend 2>/dev/null || true
          sudo docker compose rm -sf backend frontend 2>/dev/null || true
          sudo docker rm -f all-services-backend-1 all-services-frontend-1 2>/dev/null || true

          echo "If container lock exists, restart Docker"
          if sudo docker ps -a --format '{{.Names}}' | grep -E 'all-services-backend-1|all-services-frontend-1'; then
            sudo systemctl restart docker
            sleep 25
            sudo docker rm -f all-services-backend-1 all-services-frontend-1 2>/dev/null || true
          fi

          echo "Start MySQL"
          sudo docker compose up -d mysql-db
          sleep 30

          echo "Build and start backend/frontend"
          sudo docker compose up -d --build backend frontend
          sleep 45

          echo "Container status"
          sudo docker compose ps

          echo "Backend logs"
          sudo docker compose logs --tail=80 backend

          echo "Test backend login"
          curl -i -X POST http://localhost:8080/api/owner/auth/signin \
            -H "Content-Type: application/json" \
            -d '{"mobile":"9963795242","password":"12345"}' || true

          echo "Deployment completed successfully"
