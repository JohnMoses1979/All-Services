name: Deploy All Services to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: all-services-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy on EC2 self-hosted runner
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Run deployment script
        shell: bash
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
        run: |
          bash /home/ubuntu/All-Services/scripts/deploy.sh
