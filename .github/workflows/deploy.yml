name: Deploy All Services to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: all-services-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy on EC2 self-hosted runner
    runs-on: self-hosted

    steps:
      - name: Deploy latest code
        shell: bash
        run: |
          set -euo pipefail

          echo "Going to project..."
          cd /home/ubuntu/All-Services

          echo "Pulling latest code..."
          git config --global --add safe.directory /home/ubuntu/All-Services
          git fetch origin main
          git reset --hard origin/main

          echo "Writing env files..."
          cat > services-backend/.env <<'ENVEOF'
          ${{ secrets.BACKEND_ENV }}
          ENVEOF

          cat > services/.env <<'ENVEOF'
          ${{ secrets.FRONTEND_ENV }}
          ENVEOF

          echo "Building backend jar..."
          cd /home/ubuntu/All-Services/services-backend
          chmod +x mvnw 2>/dev/null || true

          if [ -f mvnw ]; then
            ./mvnw clean package -DskipTests
          else
            mvn clean package -DskipTests
          fi

          echo "Deploying containers without docker compose down..."
          cd /home/ubuntu/All-Services

          sudo docker compose up -d --build --remove-orphans || {
            echo "Docker compose failed once. Restarting Docker and retrying..."
            sudo systemctl restart docker
            sleep 20
            sudo docker compose up -d --build --remove-orphans
          }

          echo "Waiting for backend..."
          sleep 30

          sudo docker compose ps
          sudo docker compose logs --tail=80 backend

          echo "Testing backend..."
          curl -i http://localhost:8080 || true

          curl -i -X POST http://localhost:8080/api/owner/auth/signin \
            -H "Content-Type: application/json" \
            -d '{"mobile":"9963795242","password":"12345"}' || true

          echo "Deployment completed."
